<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      margin: 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #1a73e8;
    }
    p {
      margin: 0 0 8px;
      line-height: 1.5;
    }
    .method {
      background: #f1f3f4;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 8px;
    }
    .method strong {
      display: block;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <h2>Google Maps HD</h2>
  <div class="method">
    <strong>Hover</strong>
    Hover over any Google Maps photo and click the HD button.
  </div>
  <div class="method">
    <strong>Right-click</strong>
    Right-click a Google Maps image and select "Download HD Image".
  </div>
  <p>Images are saved to your Downloads/gmaps-hd folder at full resolution.</p>
</body>
</html>
