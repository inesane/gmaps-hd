<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      margin: 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #1a73e8;
    }
    p {
      margin: 0 0 8px;
      line-height: 1.5;
    }
    .method {
      background: #f1f3f4;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 8px;
    }
    .method strong {
      display: block;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <h2>Google Maps HD Downloader</h2>
  <div class="method">
    <strong>Photos</strong>
    Click "Download HD" to save the current photo at full original resolution.
  </div>
  <div class="method">
    <strong>Videos</strong>
    Click "Download Video" and choose quality (best available, 1080p, 720p, 360p).
  </div>
  <p>A download button appears in the bottom-right corner on any Google Maps page.</p>
</body>
</html>
